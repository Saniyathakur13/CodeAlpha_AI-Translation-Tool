<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Translator - Internship Assignment</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            padding: 30px;
            max-width: 800px;
            width: 100%;
            transition: 0.3s;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
        }

        .sub {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-style: italic;
        }

        .language-selectors {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .lang-box {
            flex: 1;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: #555;
        }

        select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: 0.2s;
            resize: vertical;
        }

        select:focus, textarea:focus {
            outline: none;
            border-color: #764ba2;
        }

        textarea {
            font-family: monospace;
            font-size: 15px;
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        button {
            background: #764ba2;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
            font-weight: bold;
            flex: 1;
        }

        button:hover {
            background: #5a3a7c;
            transform: scale(1.02);
        }

        .output-area {
            background: #f8f9ff;
            border-radius: 16px;
            padding: 20px;
            margin-top: 20px;
            border-left: 6px solid #764ba2;
        }

        .output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .output-header h3 {
            margin: 0;
            color: #333;
        }

        .small-btn {
            background: #e0e0e0;
            color: #333;
            padding: 6px 12px;
            font-size: 13px;
            border-radius: 20px;
            flex: 0 0 auto;
        }

        .small-btn:hover {
            background: #ccc;
        }

        #translatedText {
            font-size: 18px;
            line-height: 1.5;
            word-break: break-word;
            min-height: 80px;
            background: white;
            padding: 15px;
            border-radius: 12px;
            margin-top: 10px;
        }

        .loading {
            color: #764ba2;
            font-weight: bold;
        }

        footer {
            text-align: center;
            margin-top: 25px;
            font-size: 12px;
            color: #aaa;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🌍 AI Translation Tool</h1>
    <div class="sub">Internship Assignment | Google Translate API alternative</div>

    <div class="language-selectors">
        <div class="lang-box">
            <label>📤 Source Language</label>
            <select id="sourceLang">
                <option value="auto">Detect Language (Auto)</option>
                <option value="en" selected>English</option>
                <option value="es">Spanish</option>
                <option value="fr">French</option>
                <option value="de">German</option>
                <option value="it">Italian</option>
                <option value="pt">Portuguese</option>
                <option value="ru">Russian</option>
                <option value="zh">Chinese (Simplified)</option>
                <option value="ja">Japanese</option>
                <option value="ko">Korean</option>
                <option value="ar">Arabic</option>
                <option value="hi">Hindi</option>
            </select>
        </div>

        <div class="lang-box">
            <label>📥 Target Language</label>
            <select id="targetLang">
                <option value="es">Spanish</option>
                <option value="fr">French</option>
                <option value="de">German</option>
                <option value="it">Italian</option>
                <option value="pt">Portuguese</option>
                <option value="en" selected>English</option>
                <option value="ru">Russian</option>
                <option value="zh">Chinese</option>
                <option value="ja">Japanese</option>
                <option value="ko">Korean</option>
                <option value="ar">Arabic</option>
                <option value="hi">Hindi</option>
            </select>
        </div>
    </div>

    <label>✍️ Enter text to translate:</label>
    <textarea id="inputText" rows="4" placeholder="Type something here... e.g., Hello, how are you?"></textarea>

    <div class="button-group">
        <button id="translateBtn">✨ Translate</button>
        <button id="swapBtn">🔄 Swap Languages</button>
        <button id="clearBtn">🗑 Clear All</button>
    </div>

    <div class="output-area">
        <div class="output-header">
            <h3>📖 Translated Text</h3>
            <div>
                <button id="copyBtn" class="small-btn">📋 Copy</button>
                <button id="speakBtn" class="small-btn">🔊 Text-to-Speech</button>
            </div>
        </div>
        <div id="translatedText">— Translation will appear here —</div>
    </div>
    <footer>Powered by MyMemory API (free tier for educational purposes)</footer>
</div>

<script>
    // DOM elements
    const inputText = document.getElementById('inputText');
    const sourceLang = document.getElementById('sourceLang');
    const targetLang = document.getElementById('targetLang');
    const translateBtn = document.getElementById('translateBtn');
    const swapBtn = document.getElementById('swapBtn');
    const clearBtn = document.getElementById('clearBtn');
    const copyBtn = document.getElementById('copyBtn');
    const speakBtn = document.getElementById('speakBtn');
    const translatedDiv = document.getElementById('translatedText');

    // Function to call translation API (MyMemory)
    async function translateText() {
        const text = inputText.value.trim();
        if (!text) {
            translatedDiv.innerHTML = "⚠️ Please enter some text to translate.";
            return;
        }

        // Get selected languages
        let source = sourceLang.value;
        const target = targetLang.value;

        // Show loading state
        translatedDiv.innerHTML = '<span class="loading">🔄 Translating... Please wait.</span>';

        try {
            // MyMemory API endpoint
            // For auto-detect source, send empty string or 'auto'
            const srcParam = (source === 'auto' || !source) ? 'auto' : source;
            
            // Using MyMemory's public API (no key required)
            const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${srcParam}|${target}`;
            
            const response = await fetch(url);
            const data = await response.json();
            
            // Extract translated text
            let translated = data.responseData.translatedText;
            
            // MyMemory sometimes returns the original text if no translation found
            if (translated === text) {
                translated = "⚠️ Translation not found. Try different language pair or text.";
            }
            
            translatedDiv.innerHTML = translated;
        } catch (error) {
            console.error("Translation API error:", error);
            translatedDiv.innerHTML = "❌ Translation failed. Check your internet connection or try again later.";
        }
    }

    // Swap source and target languages
    function swapLanguages() {
        const temp = sourceLang.value;
        sourceLang.value = targetLang.value;
        targetLang.value = temp;
        
        // If swapped and there's text, auto-translate
        if (inputText.value.trim()) {
            translateText();
        }
    }

    // Clear all fields
    function clearAll() {
        inputText.value = "";
        translatedDiv.innerHTML = "— Translation will appear here —";
        // Optionally reset languages to default
        // sourceLang.value = "auto";
        // targetLang.value = "en";
    }

    // Copy translated text to clipboard
    async function copyTranslation() {
        const textToCopy = translatedDiv.innerText;
        if (!textToCopy || textToCopy.includes("Translation will appear")) {
            alert("Nothing to copy yet!");
            return;
        }
        
        try {
            await navigator.clipboard.writeText(textToCopy);
            alert("✅ Copied to clipboard!");
        } catch (err) {
            alert("❌ Unable to copy. Select manually.");
        }
    }

    // Text-to-Speech feature (optional bonus)
    function speakTranslation() {
        const text = translatedDiv.innerText;
        if (!text || text.includes("Translation will appear") || text.includes("⚠️") || text.includes("❌")) {
            alert("No valid translation to speak.");
            return;
        }
        
        // Get target language for speech (simplified mapping)
        const langMap = {
            'en': 'en-US', 'es': 'es-ES', 'fr': 'fr-FR', 'de': 'de-DE',
            'it': 'it-IT', 'pt': 'pt-PT', 'ru': 'ru-RU', 'zh': 'zh-CN',
            'ja': 'ja-JP', 'ko': 'ko-KR', 'ar': 'ar-EG', 'hi': 'hi-IN'
        };
        
        const targetLangCode = targetLang.value;
        const speechLang = langMap[targetLangCode] || 'en-US';
        
        if ('speechSynthesis' in window) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = speechLang;
            utterance.rate = 0.9;
            window.speechSynthesis.cancel(); // stop any ongoing speech
            window.speechSynthesis.speak(utterance);
        } else {
            alert("Your browser does not support text-to-speech.");
        }
    }

    // Trigger translation on button click
    translateBtn.addEventListener('click', translateText);
    swapBtn.addEventListener('click', swapLanguages);
    clearBtn.addEventListener('click', clearAll);
    copyBtn.addEventListener('click', copyTranslation);
    speakBtn.addEventListener('click', speakTranslation);
    
    // Optional: Press Ctrl+Enter to translate
    inputText.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
            translateText();
        }
    });
    
    // Auto-detect note: MyMemory works well with 'auto' source
    console.log("AI Translator ready — internship assignment");
</script>
</body>
</html>
